name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Build and deploy are separate jobs so a transient Pages failure can be
# retried with "re-run failed jobs": re-running a job that both uploads and
# deploys would upload a second github-pages artifact into the same run,
# which deploy-pages rejects ("Multiple artifacts named ... found").
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Enables GitHub Pages for the repo on first run, so no manual
          # settings step is needed (requires the repo to be public, or a
          # plan that allows Pages on private repos).
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
