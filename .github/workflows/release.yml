name: Release extension

# Publishes a versioned, installable ZIP of the extension automatically on
# every merge to main that touches extension/. The version is computed by
# patch-bumping the latest v* tag (starting at v0.1.0 if none exist); the
# release itself creates the tag.
#
# For a minor/major bump, run the workflow manually from the Actions tab
# (workflow_dispatch) and type the version, e.g. 0.3.0.

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.3.0). Leave empty to patch-bump the latest tag."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="0.1.0"
            else
              IFS=. read -r MA MI PA _ <<< "${LATEST#v}"
              VERSION="$MA.${MI:-0}.$(( ${PA:-0} + 1 ))"
            fi
          fi
          # Chrome requires 1-4 dot-separated integers.
          if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+){0,3}$ ]]; then
            echo "'$VERSION' is not a valid extension version (want N, N.N, N.N.N, or N.N.N.N)" >&2
            exit 1
          fi
          if [ -n "$(git tag -l "v$VERSION")" ]; then
            echo "Tag v$VERSION already exists" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Stamp manifest version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' extension/manifest.json > manifest.tmp
          mv manifest.tmp extension/manifest.json

      - name: Package extension
        run: |
          cd extension
          zip -r "../hls-monitor-extension-v${{ steps.version.outputs.version }}.zip" .
          cd ..
          unzip -l "hls-monitor-extension-v${{ steps.version.outputs.version }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: hls-monitor-extension-*.zip
          generate_release_notes: true
          body: |
            **Install on Chrome (desktop):** download the ZIP below, unzip it,
            open `chrome://extensions`, turn on **Developer mode**, click
            **Load unpacked**, and select the unzipped folder.

            Full instructions (including mobile options): see the
            [README](https://github.com/${{ github.repository }}#install).
